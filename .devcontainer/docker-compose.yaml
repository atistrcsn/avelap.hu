services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:noble
    ports:
      - 0.0.0.0:1337:1337
      - 0.0.0.0:3000:3000
    volumes:
      - ../:/workspaces:cached
    command: sleep infinity
    env_file:
      - .env
    dns:
      - 8.8.8.8
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  postgres:
    container_name: pg
    image: postgres:16-bullseye
    # ports:
    #   - "0.0.0.0:5432:5432"
    environment:
      DEBUG: 'false'
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: strapi
      POSTGRES_DB: strapi
#      LANG: hu_HU.UTF-8
#      LANGUAGE: hu_HU:hu
#      LC_ALL: hu_HU.UTF-8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432 -t2"]
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - ../postgresql/backup/db.backup:/backup
      - ../postgresql/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
