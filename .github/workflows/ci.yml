name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - run: pnpm nx affected --target=build --parallel=3

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check affected apps
        id: affected
        run: |
          AFFECTED_APPS=$(pnpm nx affected:apps --plain)
          echo "affected_apps=$AFFECTED_APPS" >> $GITHUB_OUTPUT

      - name: Deploy API to Koyeb
        if: contains(steps.affected.outputs.affected_apps, 'api')
        run: |
          echo "TODO: Deploy API to Koyeb using koyeb-cli"
          # koyeb deploy --service api --dockerfile apps/api/Dockerfile

      - name: Deploy Web to Cloudflare
        if: contains(steps.affected.outputs.affected_apps, 'web')
        run: |
          echo "TODO: Deploy Web to Cloudflare"
          # wrangler deploy apps/web