name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    # Triggered by Strapi webhook when content changes (e.g. new event published)
    types: [strapi-content-change]

# Only one deploy may run at a time; a newer push cancels an in-flight run
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── API: build Docker image and deploy to Koyeb ─────────────────────────────
  # Runs only on code pushes — content-only changes don't need a new image.
  build-api:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/avelap-api:latest
            ghcr.io/${{ github.repository_owner }}/avelap-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Fetch Koyeb API token from Bitwarden.
      - name: Get Koyeb token from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          secrets: |
            726d39bf-42ed-425b-8625-b416018b3b27 > KOYEB_TOKEN

      # Install Koyeb CLI and trigger redeploy.
      - name: Install Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ env.KOYEB_TOKEN }}

      - name: Trigger Koyeb redeploy
        run: koyeb service redeploy useless-belle/avelap-api

  # ── Web: build Next.js static export and deploy to Cloudflare Pages ─────────
  # Runs after build-api on code pushes, and directly on content-change events.
  # 'always()' ensures it runs even when build-api was skipped (content dispatch).
  deploy-web:
    needs: build-api
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          secrets: |
            ecc1ef6e-f60a-46b9-9a0f-b41500b41e27 > API_BASEURL
            3be3df10-f821-4166-8d84-b41500b77dc1 > GOOGLETAG_ID
            741db4f6-b12e-4fb5-94f1-b41500b7611e > NEXT_PUBLIC_GOOGLE_MAPS_APIKEY
            6b902d5f-afa0-4996-85a5-b41500b993f4 > CLOUDFLARE_API_TOKEN
            71e838dd-90da-4b4e-8c6a-b41500b9c7d2 > CLOUDFLARE_ACCOUNT_ID
            5835df75-14d7-45cc-a10a-b41500b68895 > BASEURL

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ hashFiles('apps/web/package.json') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: nextjs-

      # Koyeb free-tier instances spin down when idle; on a fresh code deploy the
      # new image also needs to be pulled and started — allow up to 10 minutes.
      # Polls every 10 s (60 attempts). Exits early as soon as Strapi responds.
      - name: Wake Strapi
        run: curl -sv "${API_BASEURL%/}/_health" 2>&1 || true

      # Static export: Next.js reads content from the live Strapi API at build time
      - name: Build Next.js static export
        working-directory: apps/web
        run: pnpm build
        env:
          API_BASEURL: ${{ env.API_BASEURL }}
          GOOGLETAG_ID: ${{ env.GOOGLETAG_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_APIKEY: ${{ env.NEXT_PUBLIC_GOOGLE_MAPS_APIKEY }}
          BASEURL: ${{ env.BASEURL }}

      # Upload the static output directory to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/out --project-name=avelap-hu
